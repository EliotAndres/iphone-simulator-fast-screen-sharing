<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>iOS Simulator Stream</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
    }
    #status-bar {
      position: fixed;
      top: 16px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 13px;
      display: flex; align-items: center; gap: 8px;
      z-index: 10;
      backdrop-filter: blur(8px);
    }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #888; flex-shrink: 0; transition: background 0.3s;
    }
    #status-dot.connecting { background: #f0a500; }
    #status-dot.streaming  { background: #30d158; }
    #status-dot.error      { background: #ff453a; }
    canvas {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    #touch-indicator {
      position: fixed;
      width: 30px; height: 30px;
      border-radius: 50%;
      background: rgba(128, 0, 255, 0.45);
      border: 2px solid rgba(160, 60, 255, 0.7);
      pointer-events: none;
      transform: translate(-50%, -50%);
      display: none;
      z-index: 100;
    }
    #home-btn, #refresh-btn, #settings-btn {
      position: fixed;
      top: 16px;
      width: 36px; height: 36px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      z-index: 10;
      backdrop-filter: blur(8px);
      transition: background 0.2s;
    }
    #home-btn     { left: 16px; }
    #refresh-btn  { left: 60px; }
    #settings-btn { right: 16px; }
    #home-btn:hover, #refresh-btn:hover, #settings-btn:hover { background: rgba(255,255,255,0.15); }
    #home-btn svg, #refresh-btn svg, #settings-btn svg { width: 18px; height: 18px; fill: #fff; opacity: 0.85; }

    #settings-panel {
      position: fixed;
      top: 64px; right: 16px;
      width: 240px;
      background: rgba(0,0,0,0.72);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 14px 16px;
      z-index: 10;
      backdrop-filter: blur(12px);
      display: none;
      font-size: 12px;
    }
    #settings-panel.open { display: block; }
    #settings-panel .row { margin-bottom: 12px; }
    #settings-panel .row:last-child { margin-bottom: 0; }
    #settings-panel label {
      display: flex; justify-content: space-between;
      margin-bottom: 4px; color: rgba(255,255,255,0.85);
    }
    #settings-panel label .val { color: #30d158; font-variant-numeric: tabular-nums; }
    #settings-panel input[type="range"] {
      width: 100%; margin: 0; accent-color: #30d158;
    }
  </style>
</head>
<body>
  <div id="touch-indicator"></div>
  <div id="status-bar">
    <div id="status-dot" class="connecting"></div>
    <span id="status-text">Connecting...</span>
  </div>

  <button id="home-btn" title="Home">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
    </svg>
  </button>

  <button id="refresh-btn" title="Refresh">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M17.65 6.35A7.96 7.96 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
    </svg>
  </button>

  <button id="settings-btn" title="Quality">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M19.14 12.94a7.66 7.66 0 0 0 .06-.94 7.66 7.66 0 0 0-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.63l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.03 7.03 0 0 0-1.62-.94l-.36-2.54A.5.5 0 0 0 13.9 2h-3.84a.5.5 0 0 0-.5.42l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96a.5.5 0 0 0-.6.22L2.67 8.48a.5.5 0 0 0 .12.63l2.03 1.58c-.04.31-.06.62-.06.94s.02.63.06.94l-2.03 1.58a.5.5 0 0 0-.12.63l1.92 3.32c.13.23.4.32.64.22l2.39-.96c.49.38 1.03.7 1.62.94l.36 2.54c.04.24.25.42.5.42h3.84c.25 0 .46-.18.5-.42l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.24.1.51.01.64-.22l1.92-3.32a.5.5 0 0 0-.12-.63l-2.03-1.58zM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7z"/>
    </svg>
  </button>

  <div id="settings-panel">
    <div class="row">
      <label>FPS <span class="val" id="fps-val">30</span></label>
      <input id="fps-slider" type="range" min="5" max="60" step="1" value="30">
    </div>
    <div class="row">
      <label>Bitrate <span class="val" id="br-val">2.0 Mbps</span></label>
      <input id="br-slider" type="range" min="0.2" max="6" step="0.1" value="2.0">
    </div>
    <div class="row">
      <label>Max height <span class="val" id="mh-val">720 px</span></label>
      <input id="mh-slider" type="range" min="240" max="1440" step="60" value="720">
    </div>
  </div>

  <canvas id="video"></canvas>

  <script>
    const canvas = document.getElementById('video');
    const ctx = canvas.getContext('2d');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const homeBtn = document.getElementById('home-btn');
    const refreshBtn = document.getElementById('refresh-btn');
    const touchIndicator = document.getElementById('touch-indicator');

    const T0 = performance.now();
    function ts() { return ((performance.now() - T0) / 1000).toFixed(3) + 's'; }
    function log(label, ...args) { console.log(`[${ts()}] ${label}`, ...args); }

    log('ENV browser', navigator.userAgent);
    log('ENV VideoDecoder', typeof VideoDecoder);

    function setStatus(state, text) {
      statusDot.className = state;
      statusText.textContent = text;
    }

    // ─── Mutable connection state ─────────────────────────────────────────────
    let ws = null;
    let decoder = null;
    let framesDrawn = 0;
    let awaitingKeyframe = true;

    function sendJSON(obj) {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
    }

    // ─── Touch indicator ──────────────────────────────────────────────────────
    function showIndicator(x, y) {
      touchIndicator.style.left = x + 'px';
      touchIndicator.style.top = y + 'px';
      touchIndicator.style.display = 'block';
    }
    function hideIndicator() { touchIndicator.style.display = 'none'; }

    // ─── Touch / mouse input ──────────────────────────────────────────────────
    function sendTouch(type, clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const videoW = canvas.width;
      const videoH = canvas.height;
      if (!videoW || !videoH) return;

      const videoAspect = videoW / videoH;
      const boxAspect = rect.width / rect.height;
      let renderW, renderH, offsetX, offsetY;
      if (videoAspect > boxAspect) {
        renderW = rect.width;
        renderH = rect.width / videoAspect;
        offsetX = 0;
        offsetY = (rect.height - renderH) / 2;
      } else {
        renderH = rect.height;
        renderW = rect.height * videoAspect;
        offsetX = (rect.width - renderW) / 2;
        offsetY = 0;
      }
      const x = (clientX - rect.left - offsetX) / renderW;
      const y = (clientY - rect.top - offsetY) / renderH;
      if (x < 0 || x > 1 || y < 0 || y > 1) return;
      sendJSON({ type, x, y });
    }

    let pendingMove = null;
    let moveRafPending = false;
    let gestureActive = false;
    let lastTouchPos = null;

    function queueMove(clientX, clientY) {
      pendingMove = { clientX, clientY };
      if (!moveRafPending) {
        moveRafPending = true;
        requestAnimationFrame(() => {
          moveRafPending = false;
          if (pendingMove && gestureActive) {
            sendTouch('move', pendingMove.clientX, pendingMove.clientY);
            pendingMove = null;
          }
        });
      }
    }

    function flushPendingMove() {
      if (pendingMove) {
        sendTouch('move', pendingMove.clientX, pendingMove.clientY);
        pendingMove = null;
      }
    }

    function startGesture(clientX, clientY) {
      gestureActive = true;
      lastTouchPos = { x: clientX, y: clientY };
      showIndicator(clientX, clientY);
      sendTouch('down', clientX, clientY);
    }

    // Flush any buffered move synchronously so it can't arrive AFTER 'up'
    // (which would leave the simulator thinking a drag is still in progress).
    function endGesture(clientX, clientY) {
      if (!gestureActive) return;
      gestureActive = false;
      lastTouchPos = null;
      hideIndicator();
      flushPendingMove();
      sendTouch('up', clientX, clientY);
    }

    canvas.addEventListener('mousedown', (e) => { e.preventDefault(); startGesture(e.clientX, e.clientY); });
    canvas.addEventListener('mousemove', (e) => {
      if (!gestureActive) return;
      lastTouchPos = { x: e.clientX, y: e.clientY };
      showIndicator(e.clientX, e.clientY);
      queueMove(e.clientX, e.clientY);
    });
    // mouseup on window so a drag released outside the canvas still ends cleanly.
    window.addEventListener('mouseup', (e) => { endGesture(e.clientX, e.clientY); });

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const t = e.touches[0];
      startGesture(t.clientX, t.clientY);
    });
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (!gestureActive) return;
      const t = e.touches[0];
      lastTouchPos = { x: t.clientX, y: t.clientY };
      showIndicator(t.clientX, t.clientY);
      queueMove(t.clientX, t.clientY);
    });
    canvas.addEventListener('touchend', (e) => {
      e.preventDefault();
      const t = e.changedTouches[0];
      endGesture(t.clientX, t.clientY);
    });
    // Safari fires touchcancel (not touchend) when the system reclaims the
    // gesture — scroll hijack, multi-touch, system UI, notification. Without
    // this, the simulator would think a finger is still on the screen.
    canvas.addEventListener('touchcancel', (e) => {
      const t = e.changedTouches[0];
      endGesture(t?.clientX ?? 0, t?.clientY ?? 0);
    });

    // ─── WebCodecs decoder ────────────────────────────────────────────────────
    function configureDecoder(codec, width, height) {
      if (typeof VideoDecoder === 'undefined') {
        setStatus('error', 'Browser has no VideoDecoder (needs Safari 16.4+ / Chrome 94+)');
        return;
      }
      if (decoder) {
        try { decoder.close(); } catch {}
        decoder = null;
      }
      canvas.width = width;
      canvas.height = height;
      decoder = new VideoDecoder({
        output: (frame) => {
          // iOS Safari is aggressive about memory pressure; close the frame the
          // moment we're done drawing or decoding stalls within seconds.
          try { ctx.drawImage(frame, 0, 0, canvas.width, canvas.height); }
          finally { frame.close(); }
          framesDrawn++;
          if (framesDrawn === 1) setStatus('streaming', 'Streaming');
        },
        error: (e) => {
          log('decoder error', e.message);
          setStatus('error', 'Decoder error');
          awaitingKeyframe = true;
          sendJSON({ type: 'request-keyframe' });
        }
      });
      decoder.configure({ codec, optimizeForLatency: true, hardwareAcceleration: 'prefer-hardware' });
      awaitingKeyframe = true;
      log('decoder configured', codec, `${width}x${height}`);
    }

    function handleBinaryFrame(buf) {
      if (!decoder || decoder.state !== 'configured') return;
      const view = new DataView(buf);
      const isKey = view.getUint8(0) === 0x01;
      const hi = view.getUint32(1);
      const lo = view.getUint32(5);
      const pts = hi * 4294967296 + lo;
      const payload = new Uint8Array(buf, 9);

      if (awaitingKeyframe) {
        if (!isKey) return;
        awaitingKeyframe = false;
      }

      try {
        decoder.decode(new EncodedVideoChunk({
          type: isKey ? 'key' : 'delta',
          timestamp: pts,
          data: payload
        }));
      } catch (e) {
        log('decode threw', e.message);
        awaitingKeyframe = true;
        sendJSON({ type: 'request-keyframe' });
      }
    }

    // ─── Connection lifecycle ────────────────────────────────────────────────
    function disconnect() {
      log('disconnect', 'tearing down connection');
      if (decoder) { try { decoder.close(); } catch {} decoder = null; }
      if (ws)      { try { ws.close(); } catch {}      ws = null; }
      awaitingKeyframe = true;
      framesDrawn = 0;
    }

    function reconnect() {
      disconnect();
      setStatus('connecting', 'Reconnecting...');
      // Let the server see the close before we re-open.
      setTimeout(connect, 200);
    }

    function connect() {
      const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${wsProto}//${location.host}/ws`;
      log('connect', wsUrl);
      ws = new WebSocket(wsUrl);
      ws.binaryType = 'arraybuffer';

      ws.onopen = () => {
        log('WS open');
        setStatus('connecting', 'Waiting for first frame...');
        // Only re-send settings if the user has changed them this session.
        // Auto-pushing defaults on every reconnect was racing SCStream and
        // leaving the stream not delivering past the first frame.
        if (userTouchedSliders) pushConfigOnConnect();
      };

      ws.onmessage = (event) => {
        if (event.data instanceof ArrayBuffer) {
          handleBinaryFrame(event.data);
          return;
        }
        let msg;
        try { msg = JSON.parse(event.data); } catch { return; }

        if (msg.type === 'video-init') {
          log('video-init', msg.codec, `${msg.width}x${msg.height}`);
          setStatus('connecting', 'Decoder ready');
          configureDecoder(msg.codec, msg.width, msg.height);
        }
      };

      ws.onerror = (e) => { log('WS error', e); setStatus('error', 'Signaling unreachable'); };
      ws.onclose = (e) => {
        log('WS closed', `code=${e.code}`, `reason=${e.reason || '(empty)'}`, `wasClean=${e.wasClean}`);
        setStatus('error', 'WS closed');
      };
    }

    // ─── Buttons ─────────────────────────────────────────────────────────────
    homeBtn.addEventListener('click', () => sendJSON({ type: 'home' }));
    refreshBtn.addEventListener('click', () => reconnect());

    // ─── Quality sliders ─────────────────────────────────────────────────────
    const settingsBtn   = document.getElementById('settings-btn');
    const settingsPanel = document.getElementById('settings-panel');
    const fpsSlider = document.getElementById('fps-slider');
    const brSlider  = document.getElementById('br-slider');
    const mhSlider  = document.getElementById('mh-slider');
    const fpsVal = document.getElementById('fps-val');
    const brVal  = document.getElementById('br-val');
    const mhVal  = document.getElementById('mh-val');

    settingsBtn.addEventListener('click', () => settingsPanel.classList.toggle('open'));

    // Load persisted values
    const saved = (() => { try { return JSON.parse(localStorage.getItem('streamConfig') || '{}'); } catch { return {}; } })();
    if (saved.fps)       fpsSlider.value = saved.fps;
    if (saved.bitrateMbps) brSlider.value = saved.bitrateMbps;
    if (saved.maxHeight) mhSlider.value = saved.maxHeight;

    function renderLabels() {
      fpsVal.textContent = `${fpsSlider.value}`;
      brVal.textContent  = `${parseFloat(brSlider.value).toFixed(1)} Mbps`;
      mhVal.textContent  = `${mhSlider.value} px`;
    }
    renderLabels();

    let configTimer = null;
    let userTouchedSliders = false;
    function scheduleConfigSend() {
      userTouchedSliders = true;
      renderLabels();
      if (configTimer) clearTimeout(configTimer);
      configTimer = setTimeout(() => {
        configTimer = null;
        const fps = parseInt(fpsSlider.value, 10);
        const bitrateMbps = parseFloat(brSlider.value);
        const maxHeight = parseInt(mhSlider.value, 10);
        localStorage.setItem('streamConfig', JSON.stringify({ fps, bitrateMbps, maxHeight }));
        sendJSON({
          type: 'config',
          fps,
          bitrate: Math.round(bitrateMbps * 1_000_000),
          maxHeight
        });
      }, 120);
    }
    fpsSlider.addEventListener('input', scheduleConfigSend);
    brSlider.addEventListener('input',  scheduleConfigSend);
    mhSlider.addEventListener('input',  scheduleConfigSend);

    // Push current settings to the server on (re)connect so saved prefs take effect.
    function pushConfigOnConnect() {
      const fps = parseInt(fpsSlider.value, 10);
      const bitrateMbps = parseFloat(brSlider.value);
      const maxHeight = parseInt(mhSlider.value, 10);
      sendJSON({
        type: 'config',
        fps,
        bitrate: Math.round(bitrateMbps * 1_000_000),
        maxHeight
      });
    }

    // ─── Visibility: pause/resume when tab backgrounds ───────────────────────
    let wasHidden = false;
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        log('visibility', 'hidden — pausing stream');
        wasHidden = true;
        // Release any in-progress touch so the simulator doesn't get stuck.
        if (gestureActive && lastTouchPos) {
          endGesture(lastTouchPos.x, lastTouchPos.y);
        }
        sendJSON({ type: 'pause' });
        setStatus('connecting', 'Paused');
        // Drop the decoder: iOS Safari will likely reclaim its resources anyway
        // while backgrounded, and we want a clean slate on resume.
        if (decoder) { try { decoder.close(); } catch {} decoder = null; }
        awaitingKeyframe = true;
      } else if (wasHidden) {
        log('visibility', 'visible — resuming stream');
        wasHidden = false;
        setStatus('connecting', 'Resuming...');
        if (ws && ws.readyState === WebSocket.OPEN) {
          // Server answers with a fresh video-init + keyframe.
          sendJSON({ type: 'resume' });
        } else {
          // Lost the socket while hidden — start over.
          connect();
        }
      }
    });

    // ─── Start ───────────────────────────────────────────────────────────────
    connect();
  </script>
</body>
</html>
