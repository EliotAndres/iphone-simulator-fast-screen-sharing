<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>iOS Simulator Stream</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
    }
    #status-bar {
      position: fixed;
      top: 16px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 13px;
      display: flex; align-items: center; gap: 8px;
      z-index: 10;
      backdrop-filter: blur(8px);
    }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #888; flex-shrink: 0; transition: background 0.3s;
    }
    #status-dot.connecting { background: #f0a500; }
    #status-dot.streaming  { background: #30d158; }
    #status-dot.error      { background: #ff453a; }
    canvas {
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
      display: block;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    #settings-btn {
      position: fixed;
      top: 16px; left: 16px;
      width: 36px; height: 36px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      z-index: 10;
      backdrop-filter: blur(8px);
      transition: background 0.2s;
    }
    #settings-btn:hover { background: rgba(255,255,255,0.15); }
    #settings-btn svg { width: 18px; height: 18px; fill: #fff; opacity: 0.85; }
    #settings-menu {
      position: fixed;
      top: 60px; left: 16px;
      background: rgba(30,30,30,0.95);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 4px 0;
      min-width: 140px;
      z-index: 10;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: none;
    }
    #settings-menu.open { display: block; }
    .menu-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px;
      font-size: 14px;
      cursor: pointer;
      border-radius: 6px;
      margin: 2px 4px;
      transition: background 0.15s;
    }
    .menu-item:hover { background: rgba(255,255,255,0.1); }
    .menu-item svg { width: 16px; height: 16px; fill: #fff; opacity: 0.7; flex-shrink: 0; }
  </style>
</head>
<body>
  <div id="status-bar">
    <div id="status-dot" class="connecting"></div>
    <span id="status-text">Connecting...</span>
  </div>

  <button id="settings-btn" title="Settings">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.92c.04-.34.07-.69.07-1.08s-.03-.74-.07-1.08l2.32-1.82c.21-.16.27-.46.13-.7l-2.2-3.81c-.14-.23-.43-.31-.67-.23l-2.73 1.1c-.57-.44-1.18-.8-1.85-1.08L14.92 2.1c-.04-.26-.27-.46-.54-.46h-4.4c-.27 0-.5.2-.54.46l-.42 2.88c-.67.28-1.29.64-1.85 1.08L4.44 6.06c-.24-.09-.53 0-.67.23L1.57 10.1c-.14.24-.08.54.13.7l2.32 1.82c-.04.34-.06.7-.06 1.08s.02.74.06 1.08L1.7 16.6c-.21.16-.27.46-.13.7l2.2 3.81c.14.23.43.31.67.23l2.73-1.1c.57.44 1.18.8 1.85 1.08l.42 2.88c.04.26.27.46.54.46h4.4c.27 0 .5-.2.54-.46l.42-2.88c.67-.28 1.28-.64 1.85-1.08l2.73 1.1c.24.09.53 0 .67-.23l2.2-3.81c.14-.24.08-.54-.13-.7l-2.32-1.82z"/>
    </svg>
  </button>

  <div id="settings-menu">
    <div class="menu-item" id="menu-home">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
      </svg>
      Home
    </div>
  </div>

  <canvas id="video"></canvas>

  <script>
    const canvas = document.getElementById('video');
    const ctx = canvas.getContext('2d');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const settingsBtn = document.getElementById('settings-btn');
    const settingsMenu = document.getElementById('settings-menu');

    const T0 = performance.now();
    function ts() { return ((performance.now() - T0) / 1000).toFixed(3) + 's'; }
    function log(label, ...args) { console.log(`[${ts()}] ${label}`, ...args); }

    log('ENV browser', navigator.userAgent);
    log('ENV VideoDecoder', typeof VideoDecoder);
    log('ENV WebSocket binaryType', 'arraybuffer');

    function setStatus(state, text) {
      statusDot.className = state;
      statusText.textContent = text;
    }

    // ─── Settings menu ────────────────────────────────────────────────────────
    settingsBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      settingsMenu.classList.toggle('open');
    });
    document.addEventListener('click', () => settingsMenu.classList.remove('open'));

    function sendJSON(obj) {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
    }

    document.getElementById('menu-home').addEventListener('click', () => {
      sendJSON({ type: 'home' });
      settingsMenu.classList.remove('open');
    });

    // ─── Touch / mouse input ──────────────────────────────────────────────────
    function sendTouch(type, clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const videoW = canvas.width;
      const videoH = canvas.height;
      if (!videoW || !videoH) return;

      const videoAspect = videoW / videoH;
      const boxAspect = rect.width / rect.height;
      let renderW, renderH, offsetX, offsetY;
      if (videoAspect > boxAspect) {
        renderW = rect.width;
        renderH = rect.width / videoAspect;
        offsetX = 0;
        offsetY = (rect.height - renderH) / 2;
      } else {
        renderH = rect.height;
        renderW = rect.height * videoAspect;
        offsetX = (rect.width - renderW) / 2;
        offsetY = 0;
      }
      const x = (clientX - rect.left - offsetX) / renderW;
      const y = (clientY - rect.top - offsetY) / renderH;
      if (x < 0 || x > 1 || y < 0 || y > 1) return;
      sendJSON({ type, x, y });
    }

    let pendingMove = null;
    let moveRafPending = false;
    let gestureActive = false;

    function queueMove(clientX, clientY) {
      pendingMove = { clientX, clientY };
      if (!moveRafPending) {
        moveRafPending = true;
        requestAnimationFrame(() => {
          moveRafPending = false;
          if (pendingMove && gestureActive) {
            sendTouch('move', pendingMove.clientX, pendingMove.clientY);
            pendingMove = null;
          }
        });
      }
    }

    function flushPendingMove() {
      if (pendingMove) {
        sendTouch('move', pendingMove.clientX, pendingMove.clientY);
        pendingMove = null;
      }
    }

    function startGesture(clientX, clientY) {
      gestureActive = true;
      sendTouch('down', clientX, clientY);
    }

    // Flush any buffered move synchronously so it can't arrive AFTER 'up'
    // (which would leave the simulator thinking a drag is still in progress).
    function endGesture(clientX, clientY) {
      if (!gestureActive) return;
      gestureActive = false;
      flushPendingMove();
      sendTouch('up', clientX, clientY);
    }

    canvas.addEventListener('mousedown', (e) => { e.preventDefault(); startGesture(e.clientX, e.clientY); });
    canvas.addEventListener('mousemove', (e) => { if (gestureActive) queueMove(e.clientX, e.clientY); });
    // mouseup on window so a drag released outside the canvas still ends cleanly.
    window.addEventListener('mouseup', (e) => { endGesture(e.clientX, e.clientY); });

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const t = e.touches[0];
      startGesture(t.clientX, t.clientY);
    });
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (!gestureActive) return;
      const t = e.touches[0];
      queueMove(t.clientX, t.clientY);
    });
    canvas.addEventListener('touchend', (e) => {
      e.preventDefault();
      const t = e.changedTouches[0];
      endGesture(t.clientX, t.clientY);
    });
    // Safari fires touchcancel (not touchend) when the system reclaims the
    // gesture — scroll hijack, multi-touch, system UI, notification. Without
    // this, the simulator would think a finger is still on the screen.
    canvas.addEventListener('touchcancel', (e) => {
      const t = e.changedTouches[0];
      endGesture(t?.clientX ?? 0, t?.clientY ?? 0);
    });

    // ─── WebCodecs decoder ────────────────────────────────────────────────────
    let decoder = null;
    let decoderCodec = null;   // codec string we last configured with
    let framesDrawn = 0;
    let awaitingKeyframe = true;  // true until we get a keyframe to start / resume

    function configureDecoder(codec, width, height) {
      if (typeof VideoDecoder === 'undefined') {
        setStatus('error', 'Browser has no VideoDecoder (needs Safari 16.4+ / Chrome 94+)');
        return;
      }
      if (decoder) {
        try { decoder.close(); } catch {}
        decoder = null;
      }
      canvas.width = width;
      canvas.height = height;
      decoder = new VideoDecoder({
        output: (frame) => {
          // iOS Safari is aggressive about memory pressure; close the frame the
          // moment we're done drawing or decoding stalls within seconds.
          try { ctx.drawImage(frame, 0, 0, canvas.width, canvas.height); }
          finally { frame.close(); }
          framesDrawn++;
          if (framesDrawn === 1) setStatus('streaming', 'Streaming');
        },
        error: (e) => {
          log('decoder error', e.message);
          setStatus('error', 'Decoder error');
          // Reset and ask streamer for a fresh keyframe.
          awaitingKeyframe = true;
          sendJSON({ type: 'request-keyframe' });
        }
      });
      decoder.configure({ codec, optimizeForLatency: true, hardwareAcceleration: 'prefer-hardware' });
      decoderCodec = codec;
      awaitingKeyframe = true;
      log('decoder configured', codec, `${width}x${height}`);
    }

    function handleBinaryFrame(buf) {
      if (!decoder || decoder.state !== 'configured') return;
      const view = new DataView(buf);
      const isKey = view.getUint8(0) === 0x01;
      // pts µs as signed 64-bit big-endian
      const hi = view.getUint32(1);
      const lo = view.getUint32(5);
      const pts = hi * 4294967296 + lo; // safe for any realistic wall-clock µs
      const payload = new Uint8Array(buf, 9);

      // Drop everything until we see a keyframe on (re)start.
      if (awaitingKeyframe) {
        if (!isKey) return;
        awaitingKeyframe = false;
      }

      try {
        decoder.decode(new EncodedVideoChunk({
          type: isKey ? 'key' : 'delta',
          timestamp: pts,
          data: payload
        }));
      } catch (e) {
        log('decode threw', e.message);
        awaitingKeyframe = true;
        sendJSON({ type: 'request-keyframe' });
      }
    }

    // ─── Foreground / background → force fresh keyframe ───────────────────────
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        log('tab visible → request keyframe');
        awaitingKeyframe = true;
        sendJSON({ type: 'request-keyframe' });
      }
    });

    // ─── WebSocket ────────────────────────────────────────────────────────────
    const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${wsProto}//${location.host}/ws`;
    log('WS url', wsUrl);
    const ws = new WebSocket(wsUrl);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
      log('WS open');
      ws.send(JSON.stringify({ type: 'register', role: 'viewer' }));
      setStatus('connecting', 'Waiting for streamer...');
    };

    ws.onmessage = (event) => {
      if (event.data instanceof ArrayBuffer) {
        handleBinaryFrame(event.data);
        return;
      }
      let msg;
      try { msg = JSON.parse(event.data); } catch { return; }

      if (msg.type === 'streamer-ready') {
        setStatus('connecting', 'Negotiating...');
        // Streamer will now send us a video-init + keyframe.
      } else if (msg.type === 'video-init') {
        log('video-init', msg.codec, `${msg.width}x${msg.height}`);
        setStatus('connecting', 'Decoder ready');
        configureDecoder(msg.codec, msg.width, msg.height);
      } else if (msg.type === 'streamer-disconnected') {
        log('Streamer disconnected');
        setStatus('error', 'Streamer disconnected');
        if (decoder) { try { decoder.close(); } catch {} decoder = null; }
        awaitingKeyframe = true;
      }
    };

    ws.onerror = (e) => { log('WS error', e); setStatus('error', 'Signaling unreachable'); };
    ws.onclose = (e) => {
      log('WS closed', `code=${e.code}`, `reason=${e.reason || '(empty)'}`, `wasClean=${e.wasClean}`);
      setStatus('error', 'WS closed');
    };
  </script>
</body>
</html>
